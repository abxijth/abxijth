name: Update profile art

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:       # also allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Fetch contributions
        run: python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: abxijth
      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update contribution graph [skip ci]"
          git push
